services:
  - type: web
    name: unique-college-api
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_RESET_PASSWORD
        value: "false"
      - key: CLIENT_URL
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: UPLOAD_ROOT
        value: /var/data/uploads
